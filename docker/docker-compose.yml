version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: skill_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../public:/app/public   # CDN persistence
    networks:
      - skill_network

  postgres:
    image: postgres:15
    container_name: skill_pg
    restart: always
    environment:
      POSTGRES_USER: developer_skillpp
      POSTGRES_PASSWORD: mystrongpasswdonetwothree
      POSTGRES_DB: skill_plus_plus
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - skill_network

  redis:
    image: redis:7-alpine
    container_name: skill_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skill_network

  nginx:
    image: nginx:alpine
    container_name: skill_nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ../public/cdn:/usr/share/nginx/html/cdn
    depends_on:
      - app
    networks:
      - skill_network

networks:
  skill_network:

volumes:
  pg_data:
  redis_data: