<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill++ | Instructor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-indigo-900 border-b border-indigo-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <div class="flex items-center">
                <a href="/home.html" class="text-white font-bold text-xl tracking-tight">Skill<span class="text-indigo-400">++</span> <span class="text-xs font-normal text-indigo-300 ml-2 border border-indigo-400 px-2 py-0.5 rounded">Instructor</span></a>
            </div>
            <div id="nav-right" class="flex items-center"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 w-full">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">My Courses</h1>
            <button onclick="document.getElementById('createCourseModal').classList.remove('hidden')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded shadow-sm font-medium transition">+ Create Course</button>
        </div>

        <div id="instructorCourses" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-gray-500" id="loadingMsg">Loading your courses...</div>
        </div>
    </main>

    <!-- Create Course Modal -->
    <div id="createCourseModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-md shadow-xl">
            <h3 class="text-xl font-bold mb-4">Create New Course</h3>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input type="text" id="courseTitle" class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea id="courseDesc" class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none" rows="3"></textarea>
            </div>
            <div class="flex justify-end space-x-2">
                <button onclick="document.getElementById('createCourseModal').classList.add('hidden')" class="px-4 py-2 text-gray-600 hover:text-gray-900">Cancel</button>
                <button onclick="createCourse()" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Create</button>
            </div>
        </div>
    </div>

    <!-- Manage Content Modal -->
    <div id="manageContentModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 p-4 overflow-y-auto">
        <div class="bg-white rounded-lg p-6 w-full max-w-3xl shadow-xl my-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold" id="manageCourseTitle">Manage Course Content</h3>
                <button onclick="closeManageContent()" class="text-gray-500 hover:text-gray-900">&times;</button>
            </div>

            <!-- Add Module section -->
            <div class="bg-gray-50 p-4 rounded border mb-6 flex gap-2">
                <input type="text" id="newModuleTitle" placeholder="New Module Title..." class="flex-grow border rounded p-2 text-sm">
                <button onclick="addModule()" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm whitespace-nowrap">Add Module</button>
            </div>

            <!-- Existing Content -->
            <div id="courseContentList" class="space-y-4 mb-6">
                <!-- Modules and lessons populated here -->
            </div>

            <div class="flex justify-between border-t pt-4">
                <span id="manageCourseStatus" class="inline-flex rounded-full bg-yellow-100 px-2 text-xs font-semibold leading-5 text-yellow-800 self-center"></span>
                <button id="submitApprovalBtn" onclick="submitCourse()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-medium">Submit for Approval</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        checkAuthAndRole(['instructor']);
        let editingCourseId = null;

        const statusColors = {
            'draft': 'bg-gray-100 text-gray-800',
            'pending': 'bg-yellow-100 text-yellow-800',
            'approved': 'bg-green-100 text-green-800',
            'rejected': 'bg-red-100 text-red-800',
        };

        async function loadDashboard() {
            try {
                const courses = await apiCall('/instructor/courses');
                const container = document.getElementById('instructorCourses');
                
                if (courses.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">You haven\'t created any courses yet.</div>';
                    return;
                }
                
                container.innerHTML = '';
                courses.forEach(course => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-lg shadow-sm border border-gray-100 p-6 flex flex-col";
                    
                    const pStatus = `<span class="inline-flex rounded-full ${statusColors[course.status] || statusColors.draft} px-2 text-xs font-semibold leading-5 mb-2">${course.status.toUpperCase()}</span>`;

                    card.innerHTML = `
                        ${pStatus}
                        <h3 class="text-xl font-bold text-gray-900 mb-2 truncate">${course.title}</h3>
                        <p class="text-sm text-gray-500 mb-4 flex-grow line-clamp-2">${course.description}</p>
                        
                        <div class="flex justify-between mt-auto border-t pt-4">
                            <button onclick="openManageContent(${course.course_id}, '${course.title.replace(/'/g, "\\'")}', '${course.status}')" class="text-indigo-600 hover:text-indigo-900 text-sm font-medium">Manage Content</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                document.getElementById('instructorCourses').innerHTML = '<div class="col-span-full text-red-500 p-4">Error loading courses</div>';
            }
        }

        async function createCourse() {
            const title = document.getElementById('courseTitle').value;
            const description = document.getElementById('courseDesc').value;
            if (!title) return alert('Title required');

            try {
                await apiCall('/instructor/courses', 'POST', { title, description });
                document.getElementById('createCourseModal').classList.add('hidden');
                document.getElementById('courseTitle').value = '';
                document.getElementById('courseDesc').value = '';
                loadDashboard();
            } catch (err) {
                alert(err.message);
            }
        }

        async function openManageContent(courseId, title, status) {
            editingCourseId = courseId;
            document.getElementById('manageCourseTitle').textContent = `Manage: ${title}`;
            document.getElementById('manageContentModal').classList.remove('hidden');
            
            const statusEl = document.getElementById('manageCourseStatus');
            statusEl.textContent = status.toUpperCase();
            statusEl.className = `inline-flex rounded-full ${statusColors[status]} px-2 py-1 text-xs font-semibold self-center`;
            
            const submitBtn = document.getElementById('submitApprovalBtn');
            if (status !== 'draft' && status !== 'rejected') {
                submitBtn.classList.add('hidden');
            } else {
                submitBtn.classList.remove('hidden');
            }

            refreshCourseContent();
        }

        async function refreshCourseContent() {
            try {
                // reuse the public single course endpoint to get modules and lessons
                const course = await apiCall(`/courses/${editingCourseId}`);
                const list = document.getElementById('courseContentList');
                list.innerHTML = '';
                
                if (!course.modules || course.modules.length === 0) {
                    list.innerHTML = '<p class="text-gray-500 text-center py-4 border rounded">No modules yet. Add one above.</p>';
                    return;
                }

                course.modules.forEach(mod => {
                    const mDiv = document.createElement('div');
                    mDiv.className = "border rounded-lg overflow-hidden";
                    
                    const lessonsHTML = (mod.lessons || []).map(l => `
                        <div class="flex justify-between group items-center py-2 px-4 border-b last:border-b-0 bg-white">
                            <div class="text-sm">
                                <span class="font-medium">Lesson ${l.lesson_index}:</span> ${l.title} 
                                <span class="text-gray-400 text-xs ml-2">${l.video_duration}m</span>
                            </div>
                        </div>
                    `).join('');

                    mDiv.innerHTML = `
                        <div class="bg-gray-100 px-4 py-3 font-bold border-b flex justify-between items-center">
                            <span>Module ${mod.module_index}: ${mod.title}</span>
                        </div>
                        <div class="bg-white">
                            ${lessonsHTML}
                            <div class="p-3 bg-gray-50 flex gap-2 items-center flex-wrap md:flex-nowrap">
                                <input type="text" id="newLesson_${mod.module_index}_title" placeholder="Lesson Title" class="block w-full border rounded px-2 py-1 text-sm min-w-[150px]">
                                
                                <input type="file" accept="video/mp4,video/webm,video/ogg" id="newLesson_${mod.module_index}_file" class="hidden" onchange="handleVideoUpload(this, ${mod.module_index})">
                                <button onclick="document.getElementById('newLesson_${mod.module_index}_file').click()" class="bg-indigo-100 text-indigo-700 font-medium px-3 py-1 rounded text-sm whitespace-nowrap hover:bg-indigo-200">
                                    Attach MP4...
                                </button>
                                
                                <input type="text" id="newLesson_${mod.module_index}_url" placeholder="OR YouTube URL" class="block w-full md:w-32 lg:w-48 border rounded px-2 py-1 text-sm">
                                <span id="uploadStatus_${mod.module_index}" class="text-xs text-indigo-600 font-medium hidden">Uploading...</span>
                                
                                <input type="number" id="newLesson_${mod.module_index}_dur" placeholder="Mins" class="block w-16 border rounded px-2 py-1 text-sm" value="10">
                                <button onclick="addLesson(${mod.module_index})" id="addBtn_${mod.module_index}" class="bg-slate-700 text-white px-3 py-1 rounded text-sm whitespace-nowrap hover:bg-slate-800 disabled:opacity-50">Add</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(mDiv);
                });
            } catch(e) {
                console.error("Failed to fetch full course for edit", e);
            }
        }

        async function addModule() {
            const el = document.getElementById('newModuleTitle');
            if(!el.value) return;
            try {
                await apiCall(`/instructor/courses/${editingCourseId}/modules`, 'POST', { title: el.value });
                el.value = '';
                refreshCourseContent();
            } catch(e) { alert(e.message); }
        }

        async function handleVideoUpload(inputElement, moduleIndex) {
            const file = inputElement.files[0];
            if (!file) return;

            const urlInput = document.getElementById(`newLesson_${moduleIndex}_url`);
            const statusText = document.getElementById(`uploadStatus_${moduleIndex}`);
            const addBtn = document.getElementById(`addBtn_${moduleIndex}`);
            
            try {
                urlInput.classList.add('hidden');
                statusText.classList.remove('hidden');
                statusText.textContent = 'Uploading ' + (file.size / (1024*1024)).toFixed(1) + 'MB...';
                addBtn.disabled = true;

                const formData = new FormData();
                formData.append('video', file);

                const response = await fetch(API_BASE + '/cdn/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: formData
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Upload failed');
                
                // Write returned CDN url to input
                urlInput.value = data.url;
                statusText.textContent = '✓ Uploaded';
                statusText.classList.replace('text-indigo-600', 'text-green-600');
            } catch(e) {
                alert(e.message);
                statusText.classList.add('hidden');
                urlInput.classList.remove('hidden');
            } finally {
                addBtn.disabled = false;
            }
        }

        async function addLesson(moduleIndex) {
            const title = document.getElementById(`newLesson_${moduleIndex}_title`).value;
            const video_url = document.getElementById(`newLesson_${moduleIndex}_url`).value;
            const video_duration = parseInt(document.getElementById(`newLesson_${moduleIndex}_dur`).value) || 0;
            
            if(!title) return alert("Title required");

            try {
                await apiCall(`/instructor/courses/${editingCourseId}/modules/${moduleIndex}/lessons`, 'POST', { 
                    title, video_url, video_duration 
                });
                refreshCourseContent();
            } catch(e) { alert(e.message); }
        }

        async function submitCourse() {
            if(!confirm("Are you sure you want to submit this course to Admins for review?")) return;
            try {
                await apiCall(`/instructor/courses/${editingCourseId}/submit`, 'PUT');
                alert("Submitted successfully");
                closeManageContent();
                loadDashboard();
            } catch(e) { alert(e.message); }
        }

        function closeManageContent() {
            document.getElementById('manageContentModal').classList.add('hidden');
            editingCourseId = null;
        }

        loadDashboard();
    </script>
</body>
</html>
