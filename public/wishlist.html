<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill++ | Wishlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <div class="flex items-center">
                <a href="/home.html" class="text-white font-bold text-xl tracking-tight">Skill<span class="text-indigo-500">++</span></a>
                <div class="hidden md:block ml-10">
                    <div class="flex items-baseline space-x-4">
                        <a href="/dashboard.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                        <a href="/browse.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Browse Courses</a>
                        <a href="/wishlist.html" class="bg-slate-800 text-white px-3 py-2 rounded-md text-sm font-medium">Wishlist</a>
                    </div>
                </div>
            </div>
            <div id="nav-right" class="flex items-center"></div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 w-full">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">My Wishlist</h1>
        <div id="wishlistCourses" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-gray-500 hidden" id="loadingMsg">Loading your wishlist...</div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        checkAuthAndRole(['learner']);
        
        async function loadWishlist() {
            try {
                const courses = await apiCall('/learner/wishlist');
                const container = document.getElementById('wishlistCourses');
                
                if (courses.length === 0) {
                    container.innerHTML = '<div class="col-span-full py-12 text-center text-gray-500">Your wishlist is empty. <a href="/browse.html" class="text-indigo-600 hover:underline">Explore courses</a></div>';
                    return;
                }

                container.innerHTML = '';
                courses.forEach(course => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-lg shadow-sm border border-gray-100 p-6 flex flex-col transition hover:shadow-md cursor-pointer relative";
                    
                    card.innerHTML = `
                        <button onclick="removeFromWishlist(${course.course_id}, event)" class="absolute top-4 right-4 text-red-400 hover:text-red-600" title="Remove from wishlist">
                            <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" /></svg>
                        </button>
                        <div onclick="window.location.href = '/course.html?id=${course.course_id}'">
                            <h3 class="text-xl font-bold text-gray-900 mb-2 pr-8">${course.title}</h3>
                            <p class="text-sm text-gray-500 mb-4 flex-grow line-clamp-3">${course.description}</p>
                            <div class="border-t border-gray-100 pt-4 flex justify-between items-center">
                                <span class="text-sm font-medium text-gray-700">By ${course.instructor_name}</span>
                                <span class="px-2 py-1 text-xs font-semibold rounded bg-indigo-100 text-indigo-800">Learn</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('wishlistCourses').innerHTML = `<div class="col-span-full py-12 text-center text-red-500">Failed to load wishlist.</div>`;
            }
        }
        
        async function removeFromWishlist(courseId, event) {
            event.stopPropagation();
            try {
                await apiCall(`/learner/wishlist/${courseId}`, 'DELETE');
                loadWishlist();
            } catch (err) {
                alert("Failed to remove: " + err.message);
            }
        }

        loadWishlist();
    </script>
</body>
</html>
