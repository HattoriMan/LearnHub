<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill++ | Browse Courses</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <div class="flex items-center">
                <a href="/home.html" class="text-white font-bold text-xl tracking-tight">Skill<span class="text-indigo-500">++</span></a>
                <div class="hidden md:block ml-10">
                    <div class="flex items-baseline space-x-4">
                        <a href="/home.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Home</a>
                        <a href="/browse.html" class="bg-slate-800 text-white px-3 py-2 rounded-md text-sm font-medium">Browse Courses</a>
                    </div>
                </div>
            </div>
            <div id="nav-right" class="flex items-center">
                <!-- Nav from API -->
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 w-full">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">All Courses</h1>
        <div id="courseList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Courses rendered here -->
            <div class="col-span-fulltext-center py-12 text-gray-500 hidden" id="loadingMessage">Loading courses...</div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        async function loadCourses() {
            try {
                const courses = await apiCall('/courses');
                const container = document.getElementById('courseList');
                container.innerHTML = '';
                
                if (courses.length === 0) {
                    container.innerHTML = '<div class="col-span-full py-12 text-center text-gray-500">No courses available at the moment.</div>';
                    return;
                }

                courses.forEach(course => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-lg shadow-sm border border-gray-100 p-6 flex flex-col transition hover:shadow-md cursor-pointer";
                    card.onclick = () => window.location.href = `/course.html?id=${course.course_id}`;
                    
                    card.innerHTML = `
                        <h3 class="text-xl font-bold text-gray-900 mb-2">${course.title}</h3>
                        <p class="text-sm text-gray-500 mb-4 flex-grow line-clamp-3">${course.description}</p>
                        <div class="border-t border-gray-100 pt-4 flex justify-between items-center">
                            <span class="text-sm font-medium text-gray-700">By ${course.instructor_name}</span>
                            <span class="px-2 py-1 text-xs font-semibold rounded bg-indigo-100 text-indigo-800">Learn</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('courseList').innerHTML = `<div class="col-span-full py-12 text-center text-red-500">Failed to load courses. Please try again later.</div>`;
            }
        }
        
        loadCourses();
    </script>
</body>
</html>
