<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill++ | Course Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <a href="/home.html" class="text-white font-bold text-xl tracking-tight">Skill<span class="text-indigo-500">++</span></a>
            <div id="nav-right" class="flex items-center"></div>
        </div>
    </nav>

    <div class="bg-slate-800 text-white py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto" id="courseHeader">
            <div class="animate-pulse flex space-x-4">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-8 bg-slate-700 rounded w-3/4"></div>
                    <div class="h-4 bg-slate-700 rounded w-1/2"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="flex-grow max-w-7xl mx-auto w-full py-8 px-4 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-8" id="courseContent">
            <!-- Module List -->
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 sticky top-8">
                <h3 class="text-xl font-bold text-gray-900 mb-4">Enrollment</h3>
                <div id="enrollActions" class="space-y-4">
                    <button id="enrollBtn" class="w-full justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition hidden">
                        Enroll Now
                    </button>
                    <button id="wishlistBtn" class="w-full justify-center py-3 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition hidden">
                        Add to Wishlist
                    </button>
                    <div id="enrolledMsg" class="hidden text-center text-sm text-indigo-600 font-medium bg-indigo-50 py-3 rounded-md border border-indigo-100">
                        You are enrolled in this course. <a href="/lesson.html" id="continueLink" class="underline">Continue learning</a>
                    </div>
                </div>
                <div id="actionError" class="mt-4 text-sm text-red-600 hidden text-center"></div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');

        async function init() {
            if (!courseId) return window.location.href = '/browse.html';

            try {
                const course = await apiCall(`/courses/${courseId}`);
                
                // Render Header
                document.getElementById('courseHeader').innerHTML = `
                    <h1 class="text-4xl font-extrabold mb-4">${course.title}</h1>
                    <p class="text-xl text-slate-300 mb-4">${course.description}</p>
                    <div class="text-sm font-medium text-indigo-300">Created by ${course.instructor_name}</div>
                `;

                // Render Modules
                let contentHTML = `<h2 class="text-2xl font-bold text-gray-900 mb-6">Course Content</h2>`;
                if (!course.modules || course.modules.length === 0) {
                    contentHTML += `<p class="text-gray-500">No modules available yet.</p>`;
                } else {
                    contentHTML += `<div class="bg-white border text-gray-900 border-gray-200 rounded-lg overflow-hidden divide-y divide-gray-200">`;
                    course.modules.forEach(mod => {
                        contentHTML += `
                            <div class="px-6 py-5">
                                <h4 class="text-lg font-bold mb-2">Module ${mod.module_index}: ${mod.title}</h4>
                                <ul class="list-disc pl-5 text-gray-600 space-y-1">
                                    ${mod.lessons && mod.lessons.length > 0 ? 
                                        mod.lessons.map(l => `<li>Lesson ${l.lesson_index}: ${l.title} (${l.video_duration} min)</li>`).join('') :
                                        '<li>No lessons yet.</li>'}
                                </ul>
                            </div>
                        `;
                    });
                    contentHTML += `</div>`;
                }

                // Render Reviews
                contentHTML += `<h2 class="text-2xl font-bold text-gray-900 mt-10 mb-6">Reviews</h2>`;
                if (course.reviews && course.reviews.length > 0) {
                    contentHTML += `<div class="space-y-4">`;
                    course.reviews.forEach(r => {
                        contentHTML += `
                            <div class="bg-white p-4 rounded-md shadow-sm border border-gray-100">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="font-medium text-gray-900">${r.learner_name}</span>
                                    <span class="text-yellow-500">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                                </div>
                                <p class="text-gray-600 text-sm">${r.comment}</p>
                            </div>
                        `;
                    });
                    contentHTML += `</div>`;
                } else {
                    contentHTML += `<p class="text-gray-500">No reviews yet.</p>`;
                }
                document.getElementById('courseContent').innerHTML = contentHTML;

                // Setup Actions
                setupActions();

            } catch (err) {
                console.error(err);
                document.getElementById('courseHeader').innerHTML = `<h1 class="text-red-500">Error loading course</h1>`;
            }
        }

        async function setupActions() {
            const role = getRole();
            const enrollBtn = document.getElementById('enrollBtn');
            const wishlistBtn = document.getElementById('wishlistBtn');
            const enrolledMsg = document.getElementById('enrolledMsg');
            const continueLink = document.getElementById('continueLink');
            const actionError = document.getElementById('actionError');

            if (!role) {
                enrollBtn.classList.remove('hidden');
                enrollBtn.onclick = () => window.location.href = `/login.html?redirect=/course.html?id=${courseId}`;
                return;
            }

            if (role === 'learner') {
                try {
                    const enrollments = await apiCall('/learner/enrollments');
                    const isEnrolled = enrollments.some(e => e.course_id == courseId);

                    if (isEnrolled) {
                        enrolledMsg.classList.remove('hidden');
                        continueLink.href = `/lesson.html?course_id=${courseId}`;
                    } else {
                        enrollBtn.classList.remove('hidden');
                        wishlistBtn.classList.remove('hidden');

                        enrollBtn.onclick = async () => {
                            try {
                                await apiCall('/learner/enrollments', 'POST', { course_id: courseId });
                                window.location.href = `/lesson.html?course_id=${courseId}`;
                            } catch (e) { actionError.textContent = e.message; actionError.classList.remove('hidden'); }
                        };

                        wishlistBtn.onclick = async () => {
                            try {
                                await apiCall('/learner/wishlist', 'POST', { course_id: courseId });
                                wishlistBtn.textContent = 'Added to Wishlist';
                                wishlistBtn.disabled = true;
                                wishlistBtn.classList.add('opacity-50');
                            } catch (e) { actionError.textContent = e.message; actionError.classList.remove('hidden'); }
                        };
                    }
                } catch (e) { console.error('Failed to get enrollments'); }
            }
        }

        init();
    </script>
</body>
</html>
